<!doctype html>
<html lang="fr" x-data="statusApp()">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Trainer</title>
    <link rel="stylesheet" href="vendor/pico.2.1.1min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module">
      import { statusApp } from './js/status.js'
      window.statusApp = statusApp
    </script>
    <script defer src="vendor/alpinejs.3.14.9.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="pt-section-header">
        <a href="index.html" class="pt-section-header__back">&larr; Bibliothèque</a>
        <div style="display: flex; align-items: center; gap: var(--pt-space-3); flex-wrap: wrap;">
          <h1 x-text="displayLabel" style="margin: 0;"></h1>
          <span class="pt-pill" :class="'pt-pill--' + status">Statut</span>
        </div>
        <div class="pt-section-header__stats" x-show="scores.length > 0">
          <span><strong x-text="scores.length"></strong> morceau<span x-show="scores.length > 1">x</span></span>
          <span x-show="totalPracticeMs > 0"><strong x-text="formatDuration(totalPracticeMs)"></strong> pratiqué</span>
        </div>
      </header>

      <table>
        <thead>
          <tr>
            <th>Titre</th>
            <th>Compositeur</th>
            <th>Joué en entier</th>
            <th>Dernier passage</th>
            <th>Temps pratiqué</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="score in scores" :key="score.file">
            <tr x-data="{ agg: getAggregate(score) }">
              <td>
                <a :href="'score.html?url=' + encodeURIComponent(getScoreUrl(score))" x-text="score.title"></a>
              </td>
              <td>
                <a :href="'composer.html?composer=' + encodeURIComponent(score.composer)" x-text="score.composer"></a>
              </td>
              <td x-text="agg?.timesCompleted || '—'"></td>
              <td x-text="agg?.lastCompletedAt ? formatDate(agg.lastCompletedAt) : '—'"></td>
              <td x-text="formatDuration(agg.totalPracticeTimeMs)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>
  </body>
</html>
