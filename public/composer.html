<!doctype html>
<html lang="fr" x-data="composerApp()">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Trainer</title>
    <link rel="stylesheet" href="vendor/pico.2.1.1min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module">
      import { composerApp } from './js/composer.js'
      window.composerApp = composerApp
    </script>
    <script defer src="vendor/alpinejs.3.14.9.min.js"></script>
  </head>
  <body>
    <main class="container pt-page">
      <header class="pt-section-header">
        <a href="index.html" class="pt-section-header__back">&larr; Bibliothèque</a>
        <h1 x-text="composer"></h1>
        <div class="pt-section-header__stats" x-show="scores.length > 0">
          <span><strong x-text="scores.length"></strong> morceau<span x-show="scores.length > 1">x</span></span>
          <span x-show="totalPracticeMs > 0"><strong x-text="formatDuration(totalPracticeMs)"></strong> pratiqué</span>
          <span x-show="repertoireCount > 0"><strong x-text="repertoireCount"></strong> au répertoire</span>
        </div>
      </header>

      <table>
        <thead>
          <tr>
            <th>Titre</th>
            <th>Temps pratiqué</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="score in scores" :key="score.file">
            <tr>
              <td>
                <a :href="'score.html?url=' + encodeURIComponent(getScoreUrl(score))" x-text="score.title"></a>
              </td>
              <td x-text="getAggregate(score) ? formatDuration(getAggregate(score).totalPracticeTimeMs) : '—'"></td>
              <td>
                <template x-if="getAggregate(score)">
                  <a :href="'status.html?status=' + encodeURIComponent(getAggregate(score).status)"
                     class="pt-pill is-link"
                     :class="'pt-pill--' + getAggregate(score).status"
                     x-text="statusLabel(getAggregate(score).status)"></a>
                </template>
                <template x-if="!getAggregate(score)">
                  <span class="pt-pill pt-pill--muted">—</span>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>
  </body>
</html>
