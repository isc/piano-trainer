<!doctype html>
<html lang="fr" x-data="dataApp()">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="data.pageTitle">Piano Trainer · Données</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="vendor/pico.2.1.1min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module">
      import { dataApp } from './js/data.js'
      import { initAlpineI18n } from './js/i18n.js'
      window.dataApp = dataApp
      initAlpineI18n()
      const alpine = document.createElement('script')
      alpine.src = 'vendor/alpinejs.3.14.9.min.js'
      document.head.appendChild(alpine)
    </script>
  </head>
  <body>
    <main class="container pt-data-page">
      <div class="pt-page-header">
        <a href="library.html" class="pt-topbar__back" data-i18n="data.back">← Bibliothèque</a>
        <h1 x-text="$t('data.heading')">Données</h1>
      </div>

      <!-- Local backup -->
      <article>
        <h2 x-text="$t('data.localHeading')">Sauvegarde locale</h2>
        <p x-text="$t('data.localIntro')"></p>
        <div class="pt-data-actions">
          <button type="button" class="secondary" @click="exportBackup()" x-text="$t('library.exportBackup')">📤 Exporter sauvegarde</button>
          <label class="secondary" role="button" for="backup-import" x-text="$t('library.importBackup')">📥 Importer sauvegarde</label>
          <input class="pt-sr-only" type="file" accept=".json" @change="importBackup($event)" id="backup-import" />
        </div>
      </article>

      <!-- Account / cloud -->
      <article>
        <h2 x-text="$t('data.accountHeading')">Compte</h2>

        <template x-if="!cloudConfigured">
          <p x-text="$t('data.cloudUnavailable')">La synchronisation cloud n'est pas configurée.</p>
        </template>

        <div x-show="cloudConfigured && authReady" x-cloak>
          <!-- Signed out: magic-link form -->
          <template x-if="!user">
            <div>
              <p x-text="$t('data.accountIntro')"></p>
              <template x-if="authStatus === 'sent'">
                <p class="pt-sync-ok" x-text="$t('data.linkSent')">Lien envoyé !</p>
              </template>
              <template x-if="authStatus !== 'sent'">
                <form @submit.prevent="sendMagicLink()" class="pt-account-form">
                  <input
                    type="email"
                    x-model="email"
                    required
                    :disabled="authStatus === 'sending'"
                    :placeholder="$t('data.emailPlaceholder')"
                    :aria-label="$t('data.emailLabel')"
                  />
                  <button type="submit" :aria-busy="authStatus === 'sending'" :disabled="!email.trim() || authStatus === 'sending'" x-text="$t('data.sendLink')">Recevoir un lien</button>
                </form>
              </template>
              <p x-show="authStatus === 'error'" role="alert" class="pt-feedback-error">
                <span x-text="$t('data.authError')">Échec :</span>
                <span x-text="authError"></span>
              </p>
            </div>
          </template>

          <!-- Signed in -->
          <template x-if="user">
            <div>
              <p><span x-text="$t('data.signedInAs')">Connecté :</span> <strong x-text="user.email"></strong></p>

              <label class="pt-sync-toggle">
                <input type="checkbox" role="switch" x-model="autoSync" @change="onAutoSyncChanged()" />
                <span x-text="$t('data.autoSync')">Synchronisation automatique</span>
              </label>

              <div class="pt-data-actions">
                <button type="button" @click="syncNow()" :aria-busy="syncStatus === 'syncing'" :disabled="syncStatus === 'syncing'" x-text="$t('data.syncNow')">Synchroniser maintenant</button>
                <button type="button" class="secondary" @click="signOut()" x-text="$t('data.signOut')">Se déconnecter</button>
              </div>

              <p class="pt-text-muted">
                <span x-text="$t('data.lastSync')">Dernière synchro :</span>
                <span x-text="lastSyncLabel()"></span>
              </p>
              <p x-show="syncStatus === 'done' && syncSummary" class="pt-sync-ok" x-text="syncSummary"></p>
              <p x-show="syncStatus === 'error'" role="alert" class="pt-feedback-error">
                <span x-text="$t('data.syncError')">Échec de la synchro :</span>
                <span x-text="syncError"></span>
              </p>
            </div>
          </template>
        </div>
      </article>
    </main>
  </body>
</html>
