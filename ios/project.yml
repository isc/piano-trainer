# XcodeGen spec — run `xcodegen generate` in this directory to produce
# PianoTrainer.xcodeproj (not committed, see .gitignore).
name: PianoTrainer
options:
  bundleIdPrefix: com.pianotrainer
  deploymentTarget:
    iOS: '15.0'
targets:
  PianoTrainer:
    type: application
    platform: iOS
    sources:
      - path: PianoTrainer
        excludes:
          - Resources
      - path: PianoTrainer/Resources/webmidi-shim.js
        buildPhase: resources
    info:
      path: PianoTrainer/Info.plist
      properties:
        CFBundleDisplayName: Piano Trainer
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: >-
          Piano Trainer se connecte aux claviers MIDI Bluetooth pour suivre ce
          que vous jouez.
        # Dev convenience: allows pointing PTWebAppURL at a local
        # (non-HTTPS) instance of the app, e.g. http://mac.local:4567
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: >-
          Accès au réseau local uniquement pour le développement, quand l'app
          charge une instance locale de Piano Trainer.
        # URL loaded by the WKWebView
        PTWebAppURL: https://isc.github.io/piano-trainer/
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: false
